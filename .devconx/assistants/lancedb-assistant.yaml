name: LanceDB Assistant
version: 0.0.4
schema: v1

rules:
  - uses: lancedb/alsania-rules

docs:
  - uses: lancedb/lancedb-enterprise-docs
  - uses: lancedb/lancedb-open-source-docs

prompts:
  - uses: lancedb/lancedb-table-prompt

models:
  - uses: ollama/gemma3-4b

  - uses: ollama/qwen2.5-coder-1.5b
    override:
      roles:
        - autocomplete

  - uses: ollama/nomic-embed-text-latest

context:
